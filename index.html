<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e0e0c">
<title>Dear Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23faf7f2'/><text y='72' x='50' text-anchor='middle' font-size='62' font-family='Georgia,serif' fill='%239a7c3f'>✦</text></svg>">
<script>
// Inline PWA manifest
const manifest = {
  name: "Dear Diary",
  short_name: "Diary",
  description: "Your private personal journal",
  start_url: "./",
  display: "standalone",
  background_color: "#faf7f2",
  theme_color: "#9a7c3f",
  orientation: "portrait-primary",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%23faf7f2'/><text y='140' x='96' text-anchor='middle' font-size='120' font-family='Georgia' fill='%239a7c3f'>✦</text></svg>", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%23faf7f2'/><text y='370' x='256' text-anchor='middle' font-size='320' font-family='Georgia' fill='%239a7c3f'>✦</text></svg>", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const murl = URL.createObjectURL(blob);
const ml = document.createElement('link');
ml.rel = 'manifest'; ml.href = murl;
document.currentScript.parentNode.insertBefore(ml, document.currentScript);
</script>
<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════════ */
:root {
  --ink:#1c1b18; --ink2:#4a4840; --ink3:#8c8880; --ink4:#c0bdb6;
  --pg:#faf7f2; --pg2:#f3efe7; --pg3:#e9e4d8; --pg4:#ddd7c8;
  --card:#ffffff;
  --border:rgba(0,0,0,.08); --border2:rgba(0,0,0,.15);
  --gold:#9a7c3f; --gold-light:rgba(154,124,63,.12);
  --rust:#8b3a2a; --rust-light:rgba(139,58,42,.08);
  --sage:#3d6351; --sage-light:rgba(61,99,81,.09);
  --r:11px; --r-lg:20px; --r-xl:28px;
  --sh: 0 1px 2px rgba(0,0,0,.04), 0 3px 16px rgba(0,0,0,.07);
  --sh-lg: 0 8px 48px rgba(0,0,0,.13), 0 2px 8px rgba(0,0,0,.06);
  --sh-btn: 0 2px 8px rgba(0,0,0,.14);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Jost',system-ui,sans-serif;
  --ease:.18s cubic-bezier(.4,0,.2,1);
}
[data-theme=dark]{
  --ink:#ede8df; --ink2:#b0ab9f; --ink3:#6e6960; --ink4:#3f3d38;
  --pg:#111008; --pg2:#18160f; --pg3:#201e16; --pg4:#282519;
  --card:#1a1812;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.14);
  --gold:#c4a35a; --gold-light:rgba(196,163,90,.1);
  --sh:0 1px 2px rgba(0,0,0,.25), 0 3px 16px rgba(0,0,0,.4);
  --sh-lg:0 8px 48px rgba(0,0,0,.6), 0 2px 8px rgba(0,0,0,.3);
}

/* ══════════════════════════════════════════
   BASE
══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--pg);color:var(--ink);min-height:100vh;
  transition:background var(--ease),color var(--ease);font-size:14.5px;line-height:1.6;
  -webkit-font-smoothing:antialiased}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;transition:all var(--ease)}
input,textarea{font-family:var(--sans);color:var(--ink);border:none;outline:none;background:transparent;font-size:14px}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes ripple{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.2);opacity:0}}

/* ══════════════════════════════════════════
   FLOATING THEME SWITCHER
══════════════════════════════════════════ */
.login-theme-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:1.25rem;padding-top:1rem;
  border-top:1px solid var(--border);
}
.login-theme-label{
  font-size:11px;color:var(--ink4);
  letter-spacing:.1em;text-transform:uppercase;
}
.login-theme-btns{
  display:flex;gap:3px;
  background:var(--pg2);border:1px solid var(--border);
  border-radius:30px;padding:3px;
}
.ltp{
  width:26px;height:26px;border-radius:50%;font-size:12px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink3);transition:all var(--ease);border:none;
  background:none;cursor:pointer;
}
.ltp.on{background:var(--card);color:var(--ink);box-shadow:var(--sh);}
.ltp:hover:not(.on){color:var(--ink2);}

/* ══════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════ */
#loginScreen{
  align-items:center;justify-content:flex-start;
  background:var(--pg);
  background-image:
    radial-gradient(ellipse 70% 50% at 50% -5%, rgba(154,124,63,.16) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 80% 90%, rgba(61,99,81,.08) 0%, transparent 60%);
  padding:2rem 1rem;
  overflow-y:auto;
  min-height:100vh;
}
.login-card{
  width:100%;max-width:368px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-xl);padding:2.5rem 2.25rem 2rem;
  box-shadow:var(--sh-lg);animation:fadeUp .45s ease both;
  margin:auto;
}

/* Emblem */
.emblem{text-align:center;margin-bottom:1.5rem;user-select:none;}
.emblem-ornament{
  display:inline-block;
  font-family:var(--serif);font-size:2rem;color:var(--gold);
  font-style:italic;line-height:1;margin-bottom:.5rem;
  opacity:.85;
  /* Thin decorative line either side */
}
.emblem-ornament::before,.emblem-ornament::after{
  content:'——';font-size:.7rem;color:var(--gold);opacity:.4;
  vertical-align:middle;margin:0 .45rem;font-style:normal;
}
.emblem-title{
  display:block;font-family:var(--serif);font-size:1.95rem;
  font-weight:400;color:var(--ink);letter-spacing:.1em;line-height:1.1;
}
.emblem-sub{
  display:block;font-size:11px;color:var(--ink3);
  letter-spacing:.18em;text-transform:uppercase;margin-top:.5rem;
}
.emblem-icon{
  width:64px;height:64px;margin:0 auto .9rem;display:flex;
  align-items:center;justify-content:center;
}
.emblem-icon svg{width:64px;height:64px;}

/* Inputs */
.field{position:relative;margin-bottom:.7rem;}
.field input{
  width:100%;padding:.78rem 1rem .78rem 2.6rem;
  background:var(--pg2);border:1px solid var(--border);
  border-radius:var(--r);font-size:14px;color:var(--ink);
  transition:border var(--ease),background var(--ease),box-shadow var(--ease);
}
.field input:focus{
  border-color:var(--gold);background:var(--pg);
  box-shadow:0 0 0 3px var(--gold-light);
}
.field input::placeholder{color:var(--ink4);}
.field-icon{
  position:absolute;left:.85rem;top:50%;transform:translateY(-50%);
  color:var(--ink4);pointer-events:none;display:flex;
}
.field-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}

/* Buttons */
.btn-primary{
  width:100%;padding:.78rem;margin-top:.4rem;
  background:var(--ink);color:var(--pg);
  border-radius:var(--r);font-size:13.5px;font-weight:500;letter-spacing:.05em;
  box-shadow:var(--sh-btn);
  transition:opacity var(--ease),transform var(--ease),box-shadow var(--ease);
}
.btn-primary:hover{opacity:.88;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.2);}
.btn-primary:active{transform:none;opacity:.95;}

.login-err{font-size:12px;color:var(--rust);text-align:center;margin-top:.5rem;min-height:15px;}
.login-toggle{
  font-size:12px;color:var(--ink3);text-align:center;margin-top:1rem;
  cursor:pointer;transition:color var(--ease);
}
.login-toggle:hover{color:var(--gold);}
.login-toggle span{text-decoration:underline;text-underline-offset:2px;}

/* Divider */
.or-divider{
  display:flex;align-items:center;gap:10px;
  margin:1.25rem 0;color:var(--ink4);font-size:10.5px;
  letter-spacing:.1em;text-transform:uppercase;
}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* Google btn */
.btn-google{
  width:100%;padding:.72rem 1rem;
  background:var(--pg2);border:1px solid var(--border);
  border-radius:var(--r);font-size:13px;color:var(--ink2);
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:border var(--ease),background var(--ease),transform var(--ease);
}
.btn-google:hover{border-color:var(--border2);background:var(--pg3);transform:translateY(-1px);}
.btn-google svg{width:16px;height:16px;flex-shrink:0;}
.login-note{font-size:11px;color:var(--ink4);text-align:center;margin-top:.7rem;line-height:1.65;}
.theme-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:1.25rem;padding-top:1rem;
  border-top:1px solid var(--border);
}
.theme-row-label{font-size:11px;color:var(--ink4);letter-spacing:.07em;text-transform:uppercase;}
.theme-row-btns{display:flex;gap:2px;background:var(--pg2);border-radius:20px;padding:2px;}

/* ══════════════════════════════════════════
   APP TOPBAR
══════════════════════════════════════════ */
#appScreen{background:var(--pg);}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.7rem 1.4rem;
  background:var(--card);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;box-shadow:var(--sh);
}
.topbar-brand{display:flex;align-items:center;gap:.6rem;}
.brand-mark{font-family:var(--serif);font-size:1.15rem;color:var(--gold);line-height:1;font-style:italic;}
.brand-name{font-family:var(--serif);font-size:1.1rem;font-weight:400;color:var(--ink);letter-spacing:.06em;}
.topbar-right{display:flex;gap:5px;align-items:center;}
.tb-btn{
  width:32px;height:32px;border-radius:9px;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--ink3);font-size:14px;
  transition:all var(--ease);
}
.tb-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;}
.tb-btn:hover{background:var(--pg2);color:var(--ink);border-color:var(--border2);}

/* Sync indicator */
.sync-pill{
  display:flex;align-items:center;gap:5px;padding:3px 9px;
  background:var(--pg2);border:1px solid var(--border);
  border-radius:20px;font-size:10.5px;color:var(--ink3);
  letter-spacing:.03em;transition:all .4s;
}
.sync-pill.ok{background:var(--sage-light);color:var(--sage);border-color:rgba(61,99,81,.18);}
.sync-pill.busy{background:var(--gold-light);color:var(--gold);border-color:rgba(154,124,63,.2);}
.sync-pill.err{background:var(--rust-light);color:var(--rust);border-color:rgba(139,58,42,.2);}
.sync-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.sync-pill.busy .sync-dot{animation:pulse .9s infinite;}

/* ══════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════ */
.app-body{display:flex;flex:1;height:calc(100vh - 53px);overflow:hidden;}

/* ══════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════ */
.sidebar{
  width:248px;min-width:248px;
  background:var(--card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-head{padding:.85rem .85rem .55rem;}

.btn-new{
  width:100%;padding:.6rem;margin-bottom:.55rem;
  background:var(--ink);color:var(--pg);
  border-radius:var(--r);font-size:12.5px;font-weight:500;letter-spacing:.04em;
  display:flex;align-items:center;justify-content:center;gap:7px;
  box-shadow:var(--sh-btn);
  transition:opacity var(--ease),transform var(--ease);
}
.btn-new:hover{opacity:.86;transform:translateY(-1px);}
.btn-new svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;}

/* Tabs */
.tabs{
  display:flex;gap:3px;
  background:var(--pg2);border-radius:8px;padding:3px;
}
.tab{
  flex:1;padding:.32rem;background:none;
  border-radius:6px;font-size:11.5px;color:var(--ink3);
  font-family:var(--sans);letter-spacing:.02em;
  transition:all var(--ease);
}
.tab.on{background:var(--card);color:var(--ink);font-weight:500;box-shadow:var(--sh);}

/* Drive chip */
.drive-chip{
  margin:.45rem .85rem;padding:.42rem .7rem;
  background:var(--pg2);border:1px solid var(--border);
  border-radius:8px;font-size:11px;color:var(--ink3);
  display:flex;align-items:center;gap:6px;cursor:pointer;
  transition:all var(--ease);
}
.drive-chip:hover{border-color:var(--border2);color:var(--ink);}
.drive-chip.ok{background:var(--sage-light);color:var(--sage);border-color:rgba(61,99,81,.18);cursor:default;}
.drive-chip svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}

/* Sidebar scroll */
.sb-scroll{flex:1;overflow-y:auto;padding-bottom:1rem;}
.sb-scroll::-webkit-scrollbar{width:2px;}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--pg4);border-radius:2px;}

/* ══════════════════════════════════════════
   CALENDAR
══════════════════════════════════════════ */
/* Month/Year clickable title */
.cal-title-btns{display:flex;align-items:center;gap:4px;}
.cal-lbl-btn{
  background:none;border:none;font-size:12px;font-weight:500;
  color:var(--ink);font-family:var(--sans);cursor:pointer;
  padding:3px 6px;border-radius:6px;transition:all var(--ease);
  letter-spacing:.03em;
}
.cal-lbl-btn:hover{background:var(--pg2);color:var(--gold);}

/* Month/Year grid picker */
.picker-grid-3{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:4px;padding:.55rem .75rem;
}
.picker-cell{
  padding:.5rem .25rem;border-radius:8px;border:none;
  background:none;font-size:12px;color:var(--ink2);
  font-family:var(--sans);cursor:pointer;text-align:center;
  transition:all var(--ease);
}
.picker-cell:hover{background:var(--pg2);color:var(--ink);}
.picker-cell.picker-on{
  background:var(--ink);color:var(--pg);font-weight:500;
}
.picker-back{
  font-size:11px;color:var(--ink4);background:none;border:none;
  cursor:pointer;padding:2px 0;font-family:var(--sans);
  transition:color var(--ease);letter-spacing:.03em;
}
.picker-back:hover{color:var(--gold);}
.cal{padding:.7rem .85rem;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem;}
.cal-lbl{font-size:12px;font-weight:500;color:var(--ink);letter-spacing:.03em;}
.cal-nav{
  width:22px;height:22px;border-radius:6px;display:flex;
  align-items:center;justify-content:center;font-size:13px;
  color:var(--ink3);transition:all var(--ease);
}
.cal-nav:hover{background:var(--pg2);color:var(--ink);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1.5px;}
.cal-dow{
  font-size:9px;font-weight:500;color:var(--ink4);
  text-align:center;padding:3px 0;text-transform:uppercase;letter-spacing:.07em;
}
.cal-d{
  aspect-ratio:1;border-radius:6px;border:none;background:none;
  font-size:10.5px;color:var(--ink3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5px;
  cursor:pointer;font-family:var(--sans);position:relative;overflow:hidden;
  transition:background var(--ease),color var(--ease);
}
.cal-d:not(.dim):hover{background:var(--pg2);color:var(--ink);}
.cal-d.has{color:var(--ink);font-weight:500;}
.cal-d.has::after{content:'';width:3px;height:3px;border-radius:50%;background:var(--gold);display:block;}
.cal-d.today{background:var(--pg3);color:var(--ink);font-weight:500;}
.cal-d.sel{background:var(--ink)!important;color:var(--pg)!important;font-weight:500;}
.cal-d.sel::after{background:rgba(255,255,255,.45)!important;}
.cal-d.dim{opacity:.2;cursor:default;pointer-events:none;}

/* Entry rows in sidebar */
.ent-sec{
  font-size:9.5px;font-weight:500;color:var(--ink4);
  padding:.55rem .85rem .18rem;text-transform:uppercase;letter-spacing:.1em;
}
.ent-row{
  padding:.48rem .85rem;cursor:pointer;
  border-left:2px solid transparent;transition:all var(--ease);
}
.ent-row:hover{background:var(--pg2);}
.ent-row.on{background:var(--pg2);border-left-color:var(--gold);}
.ent-row-top{
  font-size:11.5px;font-weight:500;color:var(--ink);
  display:flex;align-items:center;gap:5px;
}
.mood-pip{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.ent-row-pre{font-size:10.5px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}

/* ══════════════════════════════════════════
   EDITOR AREA
══════════════════════════════════════════ */
.ed-wrap{flex:1;overflow-y:auto;padding:1.5rem;}
.ed-wrap::-webkit-scrollbar{width:4px;}
.ed-wrap::-webkit-scrollbar-thumb{background:var(--pg4);border-radius:4px;}

/* Empty state */
.ed-empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:.55rem;
  text-align:center;color:var(--ink4);
}
.ed-empty-glyph{
  font-family:var(--serif);font-size:5.5rem;color:var(--gold);
  opacity:.18;font-style:italic;line-height:1;
  margin-bottom:.25rem;
}
.ed-empty h3{font-family:var(--serif);font-size:1.4rem;font-weight:400;color:var(--ink3);letter-spacing:.03em;}
.ed-empty p{font-size:12px;color:var(--ink4);}

/* Editor card */
.ed-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:2rem 2rem 1.6rem;
  max-width:700px;margin:0 auto;
  box-shadow:var(--sh);
  animation:fadeUp .2s ease both;
}

/* Top row: date + moods */
.ed-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.35rem;flex-wrap:wrap;gap:.75rem;}
.ed-date{
  font-family:var(--serif);font-size:1.6rem;font-weight:300;font-style:italic;
  color:var(--ink);padding:0;letter-spacing:.01em;min-width:190px;
  border:none;outline:none;background:transparent;
  -webkit-appearance:none;
}
.ed-date::-webkit-calendar-picker-indicator{
  opacity:.25;cursor:pointer;margin-left:4px;
}
[data-theme=dark] .ed-date::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.3);}

/* Mood bubbles */
.mood-row{display:flex;gap:5px;}
.mood-b{
  width:30px;height:30px;border-radius:50%;
  border:1.5px solid var(--border);font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--ease);background:none;
}
.mood-b:hover{border-color:var(--border2);transform:scale(1.14);}
.mood-b.on{
  border-color:var(--gold);
  background:var(--gold-light);
  transform:scale(1.14);
  box-shadow:0 0 0 2.5px var(--gold-light);
}

/* Title */
.ed-title{
  width:100%;padding:.3rem 0;
  font-family:var(--serif);font-size:1.25rem;font-weight:400;
  color:var(--ink);background:none;
  border:none;border-bottom:1px solid var(--border);
  margin-bottom:1rem;letter-spacing:.02em;
  transition:border var(--ease);
}
.ed-title:focus{border-bottom-color:var(--gold);}
.ed-title::placeholder{color:var(--ink4);font-style:italic;}

/* Body */
.ed-body{
  width:100%;min-height:230px;border:none;
  font-size:14.5px;line-height:2;color:var(--ink2);
  background:transparent;resize:vertical;font-weight:300;
  font-family:var(--sans);
}
.ed-body::placeholder{color:var(--ink4);font-style:italic;}

/* ── Media grid ── */
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px;margin-top:1rem;}
.m-thumb{
  position:relative;aspect-ratio:1;border-radius:10px;
  overflow:hidden;border:1px solid var(--border);
  background:var(--pg2);
}
.m-thumb img,.m-thumb video{width:100%;height:100%;object-fit:cover;display:block;}
.m-rm{
  position:absolute;top:4px;right:4px;
  background:rgba(0,0,0,.55);color:#fff;border:none;
  border-radius:50%;width:20px;height:20px;font-size:11px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background var(--ease);
}
.m-rm:hover{background:rgba(0,0,0,.85);}

/* ── Voice clips ── */
.voice-row{
  background:var(--pg2);border:1px solid var(--border);
  border-radius:10px;padding:.55rem .85rem;
  display:flex;align-items:center;gap:10px;margin-top:.6rem;
}
.voice-row audio{flex:1;height:26px;}
.voice-rm{background:none;border:none;color:var(--ink4);font-size:13px;padding:2px 4px;cursor:pointer;transition:color var(--ease);}
.voice-rm:hover{color:var(--rust);}

/* ══════════════════════════════════════════
   TOOLBAR — ICON BUBBLES
══════════════════════════════════════════ */
.toolbar{
  display:flex;align-items:center;gap:10px;
  margin-top:1.15rem;padding-top:1rem;
  border-top:1px solid var(--border);
}
.toolbar-hint{font-size:10.5px;color:var(--ink4);letter-spacing:.07em;text-transform:uppercase;margin-right:4px;}

.bub{
  width:42px;height:42px;border-radius:50%;
  background:var(--pg2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;overflow:hidden;
  transition:all var(--ease);
}
.bub::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:var(--ink);opacity:0;transition:opacity .15s;
}
.bub:hover{
  background:var(--pg3);border-color:var(--border2);
  transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}
.bub svg{
  width:17px;height:17px;stroke:var(--ink2);
  fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;
  position:relative;z-index:1;transition:stroke var(--ease);
}
.bub:hover svg{stroke:var(--ink);}

/* Recording ring animation */
.bub.rec{
  background:var(--rust-light);border-color:rgba(139,58,42,.3);
}
.bub.rec svg{stroke:var(--rust);}
.bub.rec::after{
  content:'';position:absolute;inset:-1px;border-radius:50%;
  border:2px solid var(--rust);opacity:0;
  animation:recRing 1.3s ease-out infinite;
}
@keyframes recRing{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.5);opacity:0}}

/* Tooltip */
.bub[title]:hover::before{display:none;}
.bub[data-tip]{position:relative;}
.bub[data-tip]::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 7px);
  left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--pg);
  font-family:var(--sans);font-size:10px;letter-spacing:.04em;
  padding:3px 8px;border-radius:5px;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .15s;
  box-shadow:var(--sh);
}
.bub[data-tip]:hover::after{opacity:1;}

/* ══════════════════════════════════════════
   SAVE ROW
══════════════════════════════════════════ */
.save-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:1.1rem;padding-top:.9rem;border-top:1px solid var(--border);
}
.btn-del{
  padding:.5rem .95rem;
  border:1px solid var(--border);border-radius:var(--r);
  font-size:12.5px;color:var(--rust);
  transition:all var(--ease);
}
.btn-del:hover{background:var(--rust-light);border-color:rgba(139,58,42,.28);}

.btn-save{
  padding:.55rem 1.4rem;
  background:var(--ink);color:var(--pg);
  border-radius:var(--r);font-size:13px;font-weight:500;letter-spacing:.04em;
  box-shadow:var(--sh-btn);
  transition:all var(--ease);
}
.btn-save:hover{opacity:.87;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.22);}
.btn-save.edit{background:var(--sage);}
.btn-edit{
  padding:.55rem 1.2rem;
  background:var(--gold-light);border:1.5px solid rgba(154,124,63,.35);
  border-radius:var(--r);font-size:13px;font-weight:500;
  color:var(--gold);letter-spacing:.03em;
  transition:all var(--ease);
}
.btn-edit:hover{background:rgba(154,124,63,.2);border-color:rgba(154,124,63,.55);}
.btn-discard{
  padding:.55rem 1rem;
  border:1px solid var(--border);border-radius:var(--r);
  font-size:13px;color:var(--ink3);
  transition:all var(--ease);
}
.btn-discard:hover{background:var(--pg2);color:var(--ink);}

/* Inline delete confirmation bar */
.del-confirm-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--rust-light);border:1px solid rgba(139,58,42,.25);
  border-radius:var(--r);padding:.65rem .9rem;margin-top:.75rem;
  gap:.75rem;flex-wrap:wrap;
  animation:fadeUp .15s ease both;
}
.del-confirm-msg{font-size:12.5px;color:var(--rust);font-weight:500;}
.del-cancel-btn{
  padding:.38rem .85rem;border:1px solid var(--border);
  border-radius:7px;font-size:12px;color:var(--ink2);
  background:var(--card);font-family:var(--sans);cursor:pointer;
  transition:all var(--ease);
}
.del-cancel-btn:hover{background:var(--pg2);}
.del-confirm-btn{
  padding:.38rem .85rem;background:var(--rust);
  border:none;border-radius:7px;font-size:12px;
  color:#fff;font-family:var(--sans);cursor:pointer;font-weight:500;
  transition:opacity var(--ease);
}
.del-confirm-btn:hover{opacity:.85;}

/* Read-only view styles */
.ed-body-read{
  width:100%;min-height:120px;font-size:14.5px;line-height:2;
  color:var(--ink2);padding:.25rem 0;cursor:text;
  font-family:var(--sans);font-weight:300;position:relative;
}
.ed-title-read{
  width:100%;padding:.3rem 0;
  font-family:var(--serif);font-size:1.25rem;font-weight:400;
  color:var(--ink);border-bottom:1px solid var(--border);
  margin-bottom:1rem;letter-spacing:.02em;cursor:text;min-height:2rem;
}
.read-hint{
  display:block;font-size:10.5px;color:var(--ink4);letter-spacing:.06em;
  text-transform:uppercase;margin-top:.6rem;opacity:0;
  transition:opacity var(--ease);
}
.ed-body-read:hover .read-hint{opacity:1;}
.mood-b:disabled{opacity:.5;cursor:default;transform:none!important;}

/* Word count */
.wc{font-size:10.5px;color:var(--ink4);letter-spacing:.04em;}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
.toast{
  position:fixed;bottom:1.4rem;left:50%;
  transform:translateX(-50%) translateY(6px);
  background:var(--ink);color:var(--pg);
  border-radius:30px;padding:.52rem 1.2rem;
  font-size:12.5px;letter-spacing:.02em;
  opacity:0;pointer-events:none;
  transition:opacity .22s,transform .22s;
  z-index:999;box-shadow:var(--sh-lg);white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:640px){
  .sidebar{
    position:fixed;left:-260px;top:53px;
    height:calc(100vh - 53px);z-index:40;width:248px;
    transition:left .25s cubic-bezier(.4,0,.2,1);
    box-shadow:var(--sh-lg);
  }
  .sidebar.open{left:0;}
  .ed-wrap{padding:1rem .8rem;}
  .ed-card{padding:1.35rem 1.1rem 1.1rem;}
  .ed-date{font-size:1.3rem;}
}
</style>
</head>
<body>

<!-- Floating theme -->
<!-- ══════════════ LOGIN ══════════════ -->
<div id="loginScreen" class="screen active">
  <div class="login-card">

    <div class="emblem">
      <div class="emblem-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Calendar base -->

          <!-- Calendar rings -->

          <!-- Divider -->
          <line x1="6" y1="21" x2="42" y2="21" stroke="var(--gold)" stroke-width="1.5" opacity=".5"/>
          <!-- Sparkle top-right -->

          <!-- Dot grid (journal lines style) -->

          <circle cx="24" cy="29" r="1.6" fill="var(--gold)" opacity=".6"/>
          <circle cx="32" cy="29" r="1.6" fill="var(--gold)" opacity=".6"/>
          <circle cx="16" cy="36" r="1.6" fill="var(--gold)" opacity=".4"/>

    <div class="field">

        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </span>
      <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
    </div>
    <div class="field">
      <span class="field-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
    </div>

    <button class="btn-primary" onclick="handleLogin()">Open my diary</button>

    <div class="login-toggle" onclick="toggleSignup()" id="signupToggle">
      Don't have an account? <span>Create one</span>
    </div>

    <div class="or-divider">or</div>

    <button class="btn-google" onclick="startGoogleAuth('login')">
      <svg viewBox="0 0 48 48">
        <path fill="#4285F4" d="M24 9.6L14.4 26.4H33.6z"/>
        <path fill="#FBBC05" d="M9.6 38.4h28.8l-4.8-8H14.4z"/>
        <path fill="#34A853" d="M14.4 26.4L9.6 38.4 0 22.8z"/>
        <path fill="#EA4335" d="M33.6 26.4L48 22.8 38.4 9.6z"/>
        <path fill="#4285F4" d="M24 9.6L38.4 9.6 48 22.8 33.6 26.4z"/>
        <path fill="#34A853" d="M9.6 38.4L14.4 26.4 24 9.6 9.6 9.6z"/>
      </svg>
      Sign in with Google
    </button>
    <p class="login-note">Google sign-in keeps your diary synced across all devices for free.</p>

    <div class="login-theme-row">
      <span class="login-theme-label">Theme</span>
      <div class="login-theme-btns">
        <button class="ltp" data-t="light" onclick="setTheme('light')" title="Light">☀</button>
        <button class="ltp" data-t="dark"  onclick="setTheme('dark')"  title="Dark">☽</button>
        <button class="ltp" data-t="system" onclick="setTheme('system')" title="System">◑</button>

</div>

<div id="appScreen" class="screen">

  <div class="topbar">
    <div class="topbar-brand">
      <button class="tb-btn" id="menuBtn" onclick="toggleSidebar()" style="display:none;margin-right:2px" aria-label="Menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

          New entry
        </button>
        <div class="tabs">

    <!-- Editor -->
    <div class="ed-wrap" id="editorWrap">
      <div class="ed-empty">

  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="photoIn" accept="image/*" multiple style="display:none" onchange="addMedia(event,'image')">
<input type="file" id="videoIn" accept="video/*" multiple style="display:none" onchange="addMedia(event,'video')">

<script>
// ── CONFIG ────────────────────────────────────────────────
const CLIENT_ID = '950704118337-14ppm2ovunjr1fg0deutr64id3cesui3.apps.googleusercontent.com';
const SCOPE = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email';
const FNAME = 'dear_diary_entries.json';

// ── STATE ─────────────────────────────────────────────────
let user=null, isGU=false, entries={};
let gTok=null, gFid=null, aPurpose='login';
let eid=null, ec={media:[],voices:[]}, editMode=false;
let theme=localStorage.getItem('dd_t')||'light';

// ── THEME ─────────────────────────────────────────────────
function applyTheme(m){
  const dark=m==='dark'||(m==='system'&&matchMedia('(prefers-color-scheme:dark)').matches);
  document.body.setAttribute('data-theme',dark?'dark':'light');
  document.querySelectorAll('.tp,.ltp').forEach(b=>b.classList.toggle('on',b.dataset.t===m));
  const tb=document.getElementById('themeBtn');
  if(tb)tb.textContent=m==='dark'?'☽':m==='system'?'◑':'☀';
}
function setTheme(m){theme=m;localStorage.setItem('dd_t',m);applyTheme(m);}
function cycleTheme(){setTheme(['light','dark','system'][(['light','dark','system'].indexOf(theme)+1)%3]);}
matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{if(theme==='system')applyTheme('system');});
applyTheme(theme);

// ── UTILS ─────────────────────────────────────────────────
function h(s){let n=0;for(let i=0;i<s.length;i++)n=Math.imul(31,n)+s.charCodeAt(i)|0;return(n>>>0).toString(36);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,ms=2700){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),ms);
}

// ── SYNC PILL ─────────────────────────────────────────────
function setSyncing(state,label){
  const p=document.getElementById('syncPill');
  const l=document.getElementById('syncLabel');
  if(!p)return;
  if(!state){p.style.display='none';return;}
  p.style.display='flex';
  p.className='sync-pill '+state;
  if(l)l.textContent=label||{ok:'Synced',busy:'Saving…',err:'Sync failed'}[state]||'';
}

// ── LOCAL ─────────────────────────────────────────────────
function lSave(){if(user)localStorage.setItem('dd_e_'+h(user),JSON.stringify(entries));}
function lLoad(){const r=localStorage.getItem('dd_e_'+h(user));return r?JSON.parse(r):{};}

// ── WORD COUNT ────────────────────────────────────────────
function updateWordCount(){
  const el=document.getElementById('wordCount');
  const body=document.getElementById('eBodyTA')||document.getElementById('eBody');
  if(!el||!body)return;
  const text=(body.value||body.textContent||'').replace(/<[^>]+>/g,'');
  const words=text.trim().split(/\s+/).filter(Boolean).length;
  el.textContent=words?words+' word'+(words===1?'':'s'):'';
}

// ── PASSWORD AUTH ─────────────────────────────────────────
let signup=false;
function toggleSignup(){
  signup=!signup;
  document.getElementById('signupToggle').innerHTML=signup
    ?'Already have an account? <span>Sign in</span>'
    :'Don\'t have an account? <span>Create one</span>';
  document.getElementById('loginSub').textContent=signup?'Create your journal':'Your private journal';
  document.getElementById('loginErr').textContent='';
}
function handleLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  const err=document.getElementById('loginErr');
  if(!u||!p){err.textContent='Please fill in both fields.';return;}
  const users=JSON.parse(localStorage.getItem('dd_users')||'{}');
  const uk='u_'+h(u);
  if(signup){
    if(users[uk]){err.textContent='Username taken — try another.';return;}
    users[uk]={hash:h(u+'::'+p)};
    localStorage.setItem('dd_users',JSON.stringify(users));
    toast('Account created ✦');
  } else {
    if(!users[uk]||users[uk].hash!==h(u+'::'+p)){err.textContent='Wrong username or password.';return;}
  }
  user=u;isGU=false;entries=lLoad();
  err.textContent='';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  localStorage.getItem('dd_dl_'+h(u))?startGoogleAuth('link_silent'):openApp();
}
function handleLogout(){
  user=null;isGU=false;entries={};gTok=null;gFid=null;
  eid=null;ec={media:[],voices:[]};
  document.getElementById('appScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  resetEd();setSyncing(null);
}

// ── GOOGLE AUTH ───────────────────────────────────────────
function startGoogleAuth(purpose){
  aPurpose=purpose;
  if(purpose==='link'||purpose==='link_silent'){
    sessionStorage.setItem('dd_pu',user||'');
    sessionStorage.setItem('dd_pp',purpose);
  }
  const params=new URLSearchParams({
    client_id:CLIENT_ID,redirect_uri:location.origin+location.pathname,
    response_type:'token',scope:SCOPE,
    prompt:purpose==='link_silent'?'none':'select_account'
  });
  window.location='https://accounts.google.com/o/oauth2/v2/auth?'+params;
}
function linkDrive(){startGoogleAuth('link');}

async function handleGCB(){
  if(!location.hash.includes('access_token='))return;
  const p=new URLSearchParams(location.hash.slice(1));
  gTok=p.get('access_token');
  history.replaceState(null,'',location.pathname);
  let profile;
  try{
    const r=await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+gTok}});
    profile=await r.json();
  }catch{toast('Google auth failed.');return;}
  const email=profile.email||'user';
  const name=(profile.name||email).split(' ')[0];
  const purpose=sessionStorage.getItem('dd_pp')||aPurpose;
  const pu=sessionStorage.getItem('dd_pu')||'';
  sessionStorage.removeItem('dd_pp');sessionStorage.removeItem('dd_pu');
  if(purpose==='link'||purpose==='link_silent'){
    user=pu;isGU=false;entries=lLoad();
    localStorage.setItem('dd_dl_'+h(user),email);
    openApp();toast('Drive linked ✓');
    await setupDrive();await syncUp();await syncDown();
  } else {
    user='g:'+email;isGU=true;
    const us=JSON.parse(localStorage.getItem('dd_users')||'{}');
    const uk='u_'+h(user);
    if(!us[uk]){us[uk]={googleEmail:email};localStorage.setItem('dd_users',JSON.stringify(us));}
    entries=lLoad();openApp();toast('Welcome back, '+name+' ✦');
    await setupDrive();await syncDown();
  }
}

// ── DRIVE ─────────────────────────────────────────────────
async function setupDrive(){
  if(!gTok)return;
  try{
    const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=name%3D'${FNAME}'%20and%20trashed%3Dfalse&fields=files(id)`,
      {headers:{Authorization:'Bearer '+gTok}});
    const d=await r.json();
    if(d.files&&d.files[0])gFid=d.files[0].id;
  }catch(e){console.error('Drive setup',e);}
}
async function syncDown(){
  if(!gTok)return;setSyncing('busy','Loading…');
  try{
    if(!gFid){await setupDrive();if(!gFid){setSyncing('ok','Synced');return;}}
    const r=await fetch('https://www.googleapis.com/drive/v3/files/'+gFid+'?alt=media',
      {headers:{Authorization:'Bearer '+gTok}});
    if(!r.ok){setSyncing('err');return;}
    const de=await r.json();
    const merged={...entries};
    for(const[id,e]of Object.entries(de)){
      if(!merged[id]||new Date(e.updated)>new Date(merged[id].updated||0))merged[id]=e;
    }
    entries=merged;lSave();refreshSB();setSyncing('ok','Synced');
    toast('Diary loaded ✓');
  }catch(e){setSyncing('err');console.error(e);}
}
async function syncUp(){
  if(!gTok)return;setSyncing('busy','Saving…');
  const body=JSON.stringify(entries);
  try{
    if(gFid){
      const r=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+gFid+'?uploadType=media',
        {method:'PATCH',headers:{Authorization:'Bearer '+gTok,'Content-Type':'application/json'},body});
      if(!r.ok)throw new Error(await r.text());
    } else {
      const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify({name:FNAME,mimeType:'application/json'})],{type:'application/json'}));
      form.append('file',new Blob([body],{type:'application/json'}));
      const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
        {method:'POST',headers:{Authorization:'Bearer '+gTok},body:form});
      if(!r.ok)throw new Error(await r.text());
      gFid=(await r.json()).id;
    }
    setSyncing('ok','Synced');
  }catch(e){setSyncing('err');console.error('Sync err',e);toast('Drive sync failed — saved locally');}
}

// ── OPEN APP ──────────────────────────────────────────────
function openApp(){
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  if(innerWidth<=640)document.getElementById('menuBtn').style.display='flex';
  const banner=document.getElementById('driveBanner');
  if(!isGU&&!gTok){
    banner.style.display='flex';banner.className='drive-chip';
    banner.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg> Link Drive for sync';
    banner.onclick=linkDrive;
  } else if(gTok){
    banner.style.display='flex';banner.className='drive-chip ok';
    banner.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg> Drive connected';
    banner.onclick=null;setSyncing('ok','Synced');
  } else banner.style.display='none';

}

// ── CALENDAR ──────────────────────────────────────────────
const MOODS={happy:'😊',sad:'😢',meh:'😐',angry:'😤',calm:'😌'};
const MOODC={happy:'#639922',sad:'#185fa5',meh:'#ba7517',angry:'#8b3a2a',calm:'#3d6351'};
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
let calY=new Date().getFullYear(),calM=new Date().getMonth();

function showTab(t){
  document.getElementById('tabCal').className='tab'+(t==='cal'?' on':'');
  document.getElementById('tabList').className='tab'+(t==='list'?' on':'');
  t==='cal'?renderCal():renderList();
}
function refreshSB(){document.getElementById('tabCal').classList.contains('on')?renderCal():renderList();}

// ── CALENDAR PICKER STATE ────────────────────────────────
let calPickerMode = 'day'; // 'day' | 'month' | 'year'
let calYearPage = Math.floor(new Date().getFullYear() / 12) * 12; // base of 12-year grid

function renderCal(){
  const sc = document.getElementById('sidebarContent');
  if(calPickerMode === 'month') { renderCalMonthPicker(sc); return; }
  if(calPickerMode === 'year')  { renderCalYearPicker(sc); return; }
  renderCalDayGrid(sc);
}

function renderCalDayGrid(sc){
  const dates = new Set(Object.values(entries).map(e=>e.date));
  const td = new Date().toISOString().split('T')[0];
  const first = new Date(calY,calM,1), sdow = first.getDay();
  const din = new Date(calY,calM+1,0).getDate(), prev = new Date(calY,calM,0).getDate();
  let html = `<div class="cal">
    <div class="cal-head">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <div class="cal-title-btns">
        <button class="cal-lbl-btn" onclick="calPickerMode='month';renderCal()">${MN[calM]}</button>
        <button class="cal-lbl-btn" onclick="calPickerMode='year';calYearPage=Math.floor(calY/12)*12;renderCal()">${calY}</button>
      </div>
      <button class="cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">`;
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => html += `<div class="cal-dow">${d}</div>`);
  for(let i=sdow-1;i>=0;i--) html += `<button class="cal-d dim" disabled>${prev-i}</button>`;
  for(let d=1;d<=din;d++){
    const ds = `${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const selE = eid && entries[eid];
    let cls = 'cal-d'+(dates.has(ds)?' has':'')+(ds===td?' today':'')+(selE&&selE.date===ds?' sel':'');
    html += `<button class="${cls}" onclick="calDayClick('${ds}')">${d}</button>`;
  }
  const rem = (sdow+din)%7;
  for(let d=1;d<=(rem?7-rem:0);d++) html += `<button class="cal-d dim" disabled>${d}</button>`;
  html += `</div></div>`;
  // Entries this month
  const mE = Object.values(entries)
    .filter(e=>e.date.startsWith(`${calY}-${String(calM+1).padStart(2,'0')}`))
    .sort((a,b)=>b.date.localeCompare(a.date));
  if(mE.length){
    html += `<div class="ent-sec">${MN[calM]} ${calY}</div>`;
    mE.forEach(e=>{
      const d = new Date(e.date+'T12:00:00');
      html += `<div class="ent-row${e.id===eid?' on':''}" onclick="openEntry('${e.id}')">
        <div class="ent-row-top"><span class="mood-pip" style="background:${MOODC[e.mood]||'var(--ink4)'}"></span>${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
        <div class="ent-row-pre">${esc((e.title||e.body||'No content').substring(0,40))}</div>
      </div>`;
    });
  }
  sc.innerHTML = html;
}

function renderCalMonthPicker(sc){
  const MNS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let html = `<div class="cal"><div class="cal-head">
    <button class="cal-nav" onclick="calY--;renderCal()">‹</button>
    <div class="cal-title-btns">
      <button class="cal-lbl-btn" onclick="calPickerMode='year';calYearPage=Math.floor(calY/12)*12;renderCal()">${calY}</button>
    </div>
    <button class="cal-nav" onclick="calY++;renderCal()">›</button>
  </div>
  <div class="picker-grid-3">`;
  MNS.forEach((m,i)=>{
    const active = i===calM ? ' picker-on' : '';
    html += `<button class="picker-cell${active}" onclick="calM=${i};calPickerMode='day';renderCal()">${m}</button>`;
  });
  html += `</div><div style="padding:.5rem .85rem">
    <button class="picker-back" onclick="calPickerMode='day';renderCal()">‹ Back to calendar</button>
  </div></div>`;
  sc.innerHTML = html;
}

function renderCalYearPicker(sc){
  const startY = calYearPage;
  let html = `<div class="cal"><div class="cal-head">
    <button class="cal-nav" onclick="calYearPage-=12;renderCal()">‹</button>
    <div class="cal-title-btns">
      <span class="cal-lbl-btn" style="cursor:default">${startY}–${startY+11}</span>
    </div>
    <button class="cal-nav" onclick="calYearPage+=12;renderCal()">›</button>
  </div>
  <div class="picker-grid-3">`;
  for(let y=startY;y<startY+12;y++){
    const active = y===calY ? ' picker-on' : '';
    html += `<button class="picker-cell${active}" onclick="calY=${y};calPickerMode='month';renderCal()">${y}</button>`;
  }
  html += `</div><div style="padding:.5rem .85rem">
    <button class="picker-back" onclick="calPickerMode='day';renderCal()">‹ Back to calendar</button>
  </div></div>`;
  sc.innerHTML = html;
}

function calNav(dir){calM+=dir;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderCal();}
function calDayClick(ds){
  const ex=Object.values(entries).find(e=>e.date===ds);
  if(ex)openEntry(ex.id);
  else{eid='new_'+Date.now();ec={id:eid,date:ds,title:'',body:'',mood:'',media:[],voices:[]};renderEd(ec);}
  renderCal();
  if(innerWidth<=640)document.getElementById('sidebar').classList.remove('open');
}
function renderList(){
  const sc=document.getElementById('sidebarContent');
  const all=Object.values(entries).sort((a,b)=>b.date.localeCompare(a.date));
  if(!all.length){sc.innerHTML='<div style="padding:.75rem .85rem;font-size:12px;color:var(--ink4)">No entries yet — start writing!</div>';return;}
  let html='',lm='';
  all.forEach(e=>{
    const d=new Date(e.date+'T12:00:00');
    const m=d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    if(m!==lm){html+=`<div class="ent-sec">${m}</div>`;lm=m;}
    html+=`<div class="ent-row${e.id===eid?' on':''}" onclick="openEntry('${e.id}')">
      <div class="ent-row-top"><span class="mood-pip" style="background:${MOODC[e.mood]||'var(--ink4)'}"></span>${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
      <div class="ent-row-pre">${esc((e.title||e.body||'No content').substring(0,40))}</div>
    </div>`;
  });
  sc.innerHTML=html;
}

// ── EDITOR ────────────────────────────────────────────────
function newEntry(){
  eid='new_'+Date.now();
  ec={id:eid,date:new Date().toISOString().split('T')[0],title:'',body:'',mood:'',media:[],voices:[]};
  renderEd(ec);
  if(innerWidth<=640)document.getElementById('sidebar').classList.remove('open');
}
function openEntry(id){
  if(!entries[id])return;
  eid=id;ec=JSON.parse(JSON.stringify(entries[id]));
  editMode=false;
  renderEd(ec);refreshSB();
  if(innerWidth<=640)document.getElementById('sidebar').classList.remove('open');
}
function resetEd(){
  document.getElementById('editorWrap').innerHTML=`<div class="ed-empty"><div class="ed-empty-glyph">✦</div><h3>Pick a day or begin writing</h3><p>Your thoughts, always with you</p></div>`;
}

function renderEd(e){
  const ew=document.getElementById('editorWrap');
  const mRow=Object.entries(MOODS).map(([k,v])=>`<button class="mood-b${e.mood===k?' on':''}" onclick="setMood('${k}')" title="${k}">${v}</button>`).join('');
  let mHtml='';
  if(e.media&&e.media.length){
    mHtml='<div class="media-grid">';
    e.media.forEach((m,i)=>{
      mHtml+=m.type==='image'
        ?`<div class="m-thumb"><img src="${m.data}" loading="lazy"><button class="m-rm" onclick="rmMedia(${i})">✕</button></div>`
        :`<div class="m-thumb"><video src="${m.data}" controls></video><button class="m-rm" onclick="rmMedia(${i})">✕</button></div>`;
    });
    mHtml+='</div>';
  }
  let vHtml='';
  if(e.voices&&e.voices.length){
    e.voices.forEach((v,i)=>{
      vHtml+=`<div class="voice-row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--ink3)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        <audio controls src="${v}" style="flex:1;height:26px"></audio>
        <button class="voice-rm" onclick="rmVoice(${i})">✕</button>
      </div>`;
    });
  }
  // isEx = this entry is already saved. editMode = user clicked Edit button.
  const isEx = !!(eid && entries[eid] && !eid.startsWith('new_'));
  // For existing entries, start in READ mode unless editMode is true
  const readOnly = isEx && !editMode;

  // Render fields as readonly text or editable inputs depending on mode
  const bodyContent = readOnly
    ? `<div class="ed-body-read" id="eBody" onclick="enterEdit()">${esc(e.body||'').replace(/\n/g,'<br>')}<span class="read-hint">Click to edit</span></div>`
    : `<textarea class="ed-body" id="eBodyTA" placeholder="What happened today? How did you feel? Write freely…" oninput="updateWordCount()">${esc(e.body||'')}</textarea>`;

  const titleContent = readOnly
    ? `<div class="ed-title-read" id="eTitle" onclick="enterEdit()">${esc(e.title||'')||'<span style="color:var(--ink4);font-style:italic">No title</span>'}</div>`
    : `<input type="text" class="ed-title" id="eTitleTA" placeholder="Give this day a title…" value="${esc(e.title||'')}">`;

  // Toolbar only shown in edit mode or for new entries
  const toolbarHtml = (!readOnly) ? `
    <div class="toolbar">
      <span class="toolbar-hint">Add</span>
      <button class="bub" onclick="document.getElementById('photoIn').click()" data-tip="Photo">
        <svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="3.5"/><path d="M9 6l1.5-2h3L15 6"/></svg>
      </button>
      <button class="bub" onclick="document.getElementById('videoIn').click()" data-tip="Video">
        <svg viewBox="0 0 24 24"><rect x="2" y="6" width="14" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3V10z"/></svg>
      </button>
      <button class="bub" id="recBub" onclick="toggleRec()" data-tip="Voice note">
        <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/></svg>
      </button>
    </div>` : '';

  // Save row buttons
  let saveRowBtns = '';
  if (!isEx) {
    // New entry: just Save
    saveRowBtns = `<button class="btn-save" onclick="saveEntry()">Save entry</button>`;
  } else if (readOnly) {
    // Existing, read mode: Edit + Delete
    saveRowBtns = `
      <button class="btn-del" onclick="delEntry()">Delete</button>
      <button class="btn-edit" onclick="enterEdit()">Edit</button>`;
  } else {
    // Existing, edit mode: Discard + Save changes
    saveRowBtns = `
      <button class="btn-discard" onclick="discardEdit()">Discard</button>
      <button class="btn-save edit" onclick="saveEntry()">Save changes</button>`;
  }

  ew.innerHTML=`<div class="ed-card">
    <div class="ed-top">
      <input type="date" class="ed-date" id="eDate" value="${e.date}" ${readOnly?'disabled':''} onchange="onDateChange(this.value)">
      <div class="mood-row">${mRow.replace(/onclick="setMood/g, readOnly ? 'disabled onclick="void' : 'onclick="setMood')}</div>
    </div>
    ${titleContent}
    ${bodyContent}
    ${mHtml}${vHtml}
    ${toolbarHtml}
    <div class="save-row">
      <span class="wc" id="wordCount"></span>
      <div style="display:flex;gap:8px;align-items:center">
        ${saveRowBtns}
      </div>
    </div>
  </div>`;
  updateWordCount();
}

function enterEdit(){
  editMode = true;
  renderEd(ec);
  // Focus body after a tick
  setTimeout(()=>{ const ta=document.getElementById('eTitleTA'); if(ta)ta.focus(); },50);
}

function discardEdit(){
  // Restore from saved entries
  if(entries[eid]) ec = JSON.parse(JSON.stringify(entries[eid]));
  editMode = false;
  renderEd(ec);
}

function setMood(m){
  ec.mood=m;
  document.querySelectorAll('.mood-b').forEach((b,i)=>b.classList.toggle('on',Object.keys(MOODS)[i]===m));
}
function rmMedia(i){ec.media.splice(i,1);renderEd(ec);}
function rmVoice(i){ec.voices.splice(i,1);renderEd(ec);}
function addMedia(ev,type){
  Array.from(ev.target.files).forEach(f=>{
    if(type==='video'&&f.size>50*1024*1024){toast('Video too large (max 50MB)');return;}
    const r=new FileReader();
    r.onload=e=>{ec.media.push({type,data:e.target.result});renderEd(ec);};
    r.readAsDataURL(f);
  });
  ev.target.value='';
}

// ── VOICE ─────────────────────────────────────────────────
let mRec=null,rChunks=[],isRec=false;
async function toggleRec(){
  if(!isRec){
    if(!navigator.mediaDevices?.getUserMedia){toast('Mic not supported — open from a web server, not a local file.');return;}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      rChunks=[];mRec=new MediaRecorder(stream);
      mRec.ondataavailable=e=>rChunks.push(e.data);
      mRec.onstop=()=>{
        const blob=new Blob(rChunks,{type:'audio/webm'});
        const rd=new FileReader();
        rd.onload=e=>{ec.voices.push(e.target.result);renderEd(ec);};
        rd.readAsDataURL(blob);
        stream.getTracks().forEach(t=>t.stop());
      };
      mRec.start();isRec=true;
      const b=document.getElementById('recBub');
      if(b){b.classList.add('rec');b.setAttribute('data-tip','Stop recording');}
    }catch{toast('Mic denied — allow microphone in browser settings.');}
  } else {
    mRec.stop();isRec=false;
    const b=document.getElementById('recBub');
    if(b){b.classList.remove('rec');b.setAttribute('data-tip','Voice note');}
  }
}

// ── DATE CHANGE ───────────────────────────────────────────
function onDateChange(nd){
  if(!nd) return;
  const ex = Object.values(entries).find(e=>e.date===nd && e.id!==eid);
  if(ex){
    // An entry exists for this date — open it
    toast('Opening entry for '+nd);
    openEntry(ex.id);
    return;
  }
  ec.date = nd;
  refreshSB();
}

// ── SAVE / DELETE ─────────────────────────────────────────
async function saveEntry(){
  const date=document.getElementById('eDate')?.value;
  // In edit mode fields are eTitleTA/eBodyTA; for new entries they are eTitleTA too
  const titleEl=document.getElementById('eTitleTA')||document.getElementById('eTitle');
  const bodyEl=document.getElementById('eBodyTA')||document.getElementById('eBody');
  const title=(titleEl?.value||'').trim();
  const body=(bodyEl?.value||bodyEl?.textContent||'').replace(/<br>/g,'\n').replace(/<[^>]+>/g,'').trim();
  if(!date){toast('Please choose a date.');return;}
  if(eid?.startsWith('new_')){eid='e_'+Date.now();ec.id=eid;}
  const entry={...ec,id:eid,date,title,body,updated:new Date().toISOString()};
  entries[eid]=entry;ec=JSON.parse(JSON.stringify(entry));
  editMode=false;
  lSave();
  if(gTok)await syncUp();
  toast(gTok?'Saved & synced ✓':'Saved locally ✓');
  refreshSB();renderEd(ec);
}
function delEntry(){
  // Show inline confirm banner instead of browser confirm() which is blocked on HTTPS hosts
  const sr = document.querySelector('.save-row');
  if(!sr) return;
  // If confirm banner already showing, ignore
  if(document.getElementById('delConfirm')) return;
  const banner = document.createElement('div');
  banner.id = 'delConfirm';
  banner.className = 'del-confirm-bar';
  banner.innerHTML = `
    <span class="del-confirm-msg">⚠ Delete this entry forever?</span>
    <div style="display:flex;gap:7px">
      <button class="del-cancel-btn" onclick="cancelDel()">Cancel</button>
      <button class="del-confirm-btn" onclick="confirmDel()">Yes, delete</button>
    </div>`;
  // Insert before save-row
  sr.parentNode.insertBefore(banner, sr);
}

function cancelDel(){
  const b = document.getElementById('delConfirm');
  if(b) b.remove();
}

async function confirmDel(){
  if(!eid) return;
  delete entries[eid];
  lSave();
  if(gTok) await syncUp();
  eid=null; ec={media:[],voices:[]};
  editMode=false;
  resetEd(); refreshSB(); toast('Entry deleted.');
}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}

// ── BOOT ──────────────────────────────────────────────────
(async()=>{
  applyTheme(theme);
  if(location.hash.includes('access_token='))await handleGCB();
})();
</script>
